apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: controller
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka
spec:
  replicas: 3
  roles:
    - controller
  resources:
    requests:
      memory: 128Mi
      cpu: 200m
    limits:
      memory: 1Gi
      cpu: 1
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 10Gi
        class: gp3
        kraftMetadata: shared
        deleteClaim: false
  template:
    kafkaContainer:
      env:
        - name: TZ
          value: "Asia/Taipei"
    pod:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: strimzi.io/pool-name
                      operator: In
                      values:
                        - controller
                topologyKey: "kubernetes.io/hostname"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: broker
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka
spec:
  replicas: 3
  roles:
    - broker
  resources:
    requests:
      memory: 256Mi
      cpu: 500m
    limits:
      memory: 4Gi
      cpu: 2
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 100Gi
        kraftMetadata: shared
        deleteClaim: false
  template:
    kafkaContainer:
      env:
        - name: TZ
          value: "Asia/Taipei"
    pod:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: strimzi.io/pool-name
                      operator: In
                      values:
                        - broker
                topologyKey: "kubernetes.io/hostname"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: kafka
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 3.9.0            #Kafka broker version
    metadataVersion: 3.9-IV0  #KRaft metadata version
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
      # # AWSLoadBalancerControllerIAMPolicy需要權限ec2:DescribeRouteTables需補上
      # - name: external
      #   port: 9094
      #   type: loadbalancer
      #   tls: false
      #   configuration:
      #     bootstrap:
      #       annotations:
      #         service.beta.kubernetes.io/aws-load-balancer-type: external
      #         service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: instance
      #         service.beta.kubernetes.io/aws-load-balancer-scheme: internal
      #         # Blue Primary
      #         service.beta.kubernetes.io/aws-load-balancer-subnets: subnet-0db920853834e13e4
      #         # Green Primary
      #         # service.beta.kubernetes.io/aws-load-balancer-subnets: subnet-0c8536305ab8146ca
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      num.replica.fetchers: 3
      replica.fetch.max.bytes: 10485760
      num.network.threads: 9
      num.io.threads: 16
    # jmx_exporter setting
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics
          key: kafka-metrics-config.yml
  entityOperator:
    topicOperator: {}
    userOperator: {}
  
  # kafka_exporter setting
  kafkaExporter:
    groupRegex: ".*" 
    topicRegex: ".*" 
    groupExcludeRegex: "^excluded-.*" 
    topicExcludeRegex: "^excluded-.*"
    showAllOffsets: false 
    resources: 
      requests:
        cpu: 200m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 128Mi
    logging: debug 
    enableSaramaLogging: true 
    template: 
      pod:
        metadata:
          labels:
            app: kafka-exporter
        securityContext:
          runAsUser: 1000001
          fsGroup: 0
        terminationGracePeriodSeconds: 120
    readinessProbe: 
      initialDelaySeconds: 15
      timeoutSeconds: 5
    livenessProbe: 
      initialDelaySeconds: 15
      timeoutSeconds: 5